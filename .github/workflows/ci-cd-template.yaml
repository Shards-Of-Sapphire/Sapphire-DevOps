name: Sapphire Central CI/CD

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true
      TWILIO_ACCOUNT_SID:
        required: true
      TWILIO_AUTH_TOKEN:
        required: true
      TWILIO_WHATSAPP_NUMBER:
        required: true
      TARGET_WHATSAPP_NUMBER:
        required: true

permissions:
  contents: write  # Required for git push

jobs:
  # --- JOB 1: Deploy ---
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      commit_message: ${{ steps.meta.outputs.commit_message }}
      commit_author: ${{ steps.meta.outputs.commit_author }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for accurate logs

      - name: Extract commit metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' "$GITHUB_SHA")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an' "$GITHUB_SHA")

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_message=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "commit_author=$COMMIT_AUTHOR" >> "$GITHUB_OUTPUT"

      - name: Run deploy script
        run: ./scripts/deploy.sh --env "${{ inputs.environment }}"
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

  # --- JOB 2: Update Changelog ---
  update-changelog:
    name: Update Changelog
    needs: deploy
    runs-on: ubuntu-latest
    if: success() || failure()  # Run even if deploy fails (but skip if canceled)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepend changelog entry
        run: |
          SHORT_SHA="${{ needs.deploy.outputs.short_sha }}"
          COMMIT_MSG="${{ needs.deploy.outputs.commit_message }}"
          COMMIT_AUTHOR="${{ needs.deploy.outputs.commit_author }}"
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')

          # Create CHANGELOG.md if it doesn't exist
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "Automatically generated by Sapphire CI/CD." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Build the new entry
          ENTRY="## [$TIMESTAMP] - $COMMIT_AUTHOR
          > **Commit:** \`$SHORT_SHA\`
          > **Message:** $COMMIT_MSG
          > **Environment:** ${{ inputs.environment }}

          "

          # Prepend to CHANGELOG.md
          echo "$ENTRY" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md

          git config user.name "Sapphire Automation"
          git config user.email "sapphire-automation@noreply.github.com"
          git add CHANGELOG.md

          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "docs: update changelog for $SHORT_SHA [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          else
            echo "No changes to CHANGELOG.md, skipping commit."
          fi

  # --- JOB 3: Notify Discord ---
  notify-discord:
    name: Notify Discord
    needs: [deploy, update-changelog]
    runs-on: ubuntu-latest
    if: always()  # Run even if previous jobs fail

    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "color=3066993" >> "$GITHUB_OUTPUT"  # Green
            echo "icon=🚀" >> "$GITHUB_OUTPUT"
            echo "title=Deployment Successful" >> "$GITHUB_OUTPUT"
          else
            echo "color=15158332" >> "$GITHUB_OUTPUT"  # Red
            echo "icon=❌" >> "$GITHUB_OUTPUT"
            echo "title=Deployment Failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ needs.deploy.outputs.short_sha }}
          COMMIT_MSG: ${{ needs.deploy.outputs.commit_message }}
          COMMIT_AUTHOR: ${{ needs.deploy.outputs.commit_author }}
          STATUS_COLOR: ${{ steps.status.outputs.color }}
          STATUS_ICON: ${{ steps.status.outputs.icon }}
          STATUS_TITLE: ${{ steps.status.outputs.title }}
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          DESC="**Repository:** \`${GITHUB_REPOSITORY}\`
          **Environment:** \`${{ inputs.environment }}\`
          **Commit:** \`${COMMIT_SHA}\`
          **Message:** ${COMMIT_MSG}
          **Author:** ${COMMIT_AUTHOR}"

          PAYLOAD=$(jq -n \
            --arg title "$STATUS_ICON $STATUS_TITLE" \
            --arg desc "$DESC" \
            --argjson color "$STATUS_COLOR" \
            --arg ts "$TIMESTAMP" \
            '{
              "embeds": [{
                "title": $title,
                "description": $desc,
                "color": $color,
                "timestamp": $ts,
                "footer": { "text": "Sapphire CI/CD" }
              }]
            }')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [[ "$HTTP_CODE" -ne 204 ]]; then
            echo "❌ Discord webhook failed (HTTP $HTTP_CODE)"
            exit 1
          fi

  # --- JOB 4: Notify WhatsApp ---
  notify-whatsapp:
    name: Notify WhatsApp
    needs: [deploy, update-changelog]
    runs-on: ubuntu-latest
    if: always()  # Run even if previous jobs fail

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Twilio
        run: pip install twilio

      - name: Send WhatsApp notification
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          TARGET_WHATSAPP_NUMBER: ${{ secrets.TARGET_WHATSAPP_NUMBER }}
          COMMIT_SHA: ${{ needs.deploy.outputs.short_sha }}
          COMMIT_MSG: ${{ needs.deploy.outputs.commit_message }}
          COMMIT_AUTHOR: ${{ needs.deploy.outputs.commit_author }}
          DEPLOY_STATUS: ${{ needs.deploy.result }}
        run: |
          python -c "
            import os
            from twilio.rest import Client

            account_sid = os.environ['TWILIO_ACCOUNT_SID']
            auth_token = os.environ['TWILIO_AUTH_TOKEN']
            from_number = os.environ['TWILIO_WHATSAPP_NUMBER']
            to_number = os.environ['TARGET_WHATSAPP_NUMBER']

            commit_sha = os.environ['COMMIT_SHA']
            commit_msg = os.environ['COMMIT_MSG']
            commit_author = os.environ['COMMIT_AUTHOR']
            deploy_status = os.environ['DEPLOY_STATUS']

            if deploy_status == 'success':
                status_emoji = '🚀'
                status_text = 'Deployment Successful'
            else:
                status_emoji = '❌'
                status_text = 'Deployment Failed'

            message = (
                f'{status_emoji} *Sapphire — {status_text}*\n\n'
                f'• *Repo:* {os.environ[\"GITHUB_REPOSITORY\"]}\n'
                f'• *Env:* ${{ inputs.environment }}\n'
                f'• *Commit:* `{commit_sha}`\n'
                f'• *Message:* {commit_msg}\n'
                f'• *Author:* {commit_author}'
            )

            try:
                client = Client(account_sid, auth_token)
                msg = client.messages.create(
                    body=message,
                    from_=f'whatsapp:{from_number}',
                    to=f'whatsapp:{to_number}'
                )
                print(f'✅ WhatsApp sent! SID: {msg.sid}')
            except Exception as e:
                print(f'❌ Twilio error: {e}')
                exit(1)
          "