name: Sapphire Central CI/CD

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Essential for git log history

      - name: Deploy
        run: ./scripts/deploy.sh --env ${{ inputs.environment }}
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

      - name: Update Chronological Changelog
        run: |
          # Create entry: Date, Commit Hash, and Message
          ENTRY="## $(date +'%Y-%m-%d') - ${GITHUB_SHA::7}
          > ${GITHUB_COMMIT_MESSAGE}
          "
          # Prepend to existing CHANGELOG.md
          echo "$ENTRY" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md
          
          git config user.name "Sapphire Automation"
          git add CHANGELOG.md
          git commit -m "docs: append new entry to changelog [skip ci]"
          git push
        env:
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      - name: Notify Discord
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 New Deployment: ${{ github.repository }}",
                "description": "Commit: `${{ github.sha }}`\nMessage: ${{ github.event.head_commit.message }}",
                "color": 3066993
              }]
            }'