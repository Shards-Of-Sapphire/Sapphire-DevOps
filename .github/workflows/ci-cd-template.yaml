name: Sapphire Central CI/CD

# ── This is a reusable workflow. Project repos call it via workflow_call. ──
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true

# ── FIX #3: Declare write access so git push-back is authorized ────────────
permissions:
  contents: write

# ════════════════════════════════════════════════════════════════════════════
jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — DEPLOY
  # Checks out the caller's repo, extracts metadata via git (not github.event),
  # and runs the project-local deploy script.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy → ${{ inputs.environment }}"
    runs-on: ubuntu-latest

    # Expose metadata to downstream jobs via outputs
    outputs:
      short_sha:      ${{ steps.meta.outputs.short_sha }}
      commit_message: ${{ steps.meta.outputs.message }}
      commit_author:  ${{ steps.meta.outputs.author }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4          # FIX #10: updated from v3
        with:
          fetch-depth: 0

      # FIX #4: Use git log — reliable in ALL trigger contexts (push, PR, manual,
      # workflow_call). github.event.head_commit is NULL for non-push callers.
      - name: 🔍 Extract commit metadata
        id: meta
        run: |
          SHORT="${GITHUB_SHA::7}"
          MSG=$(git log -1 --pretty=format:'%s' "$GITHUB_SHA")
          AUTHOR=$(git log -1 --pretty=format:'%an' "$GITHUB_SHA")

          echo "short_sha=$SHORT"  >> "$GITHUB_OUTPUT"
          echo "message=$MSG"      >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR"    >> "$GITHUB_OUTPUT"

      - name: 🚀 Run deploy script
        run: ./scripts/deploy.sh --env "${{ inputs.environment }}"
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — UPDATE CHANGELOG
  # Only runs if deploy succeeded (needs: deploy with no `if: always()`).
  # ──────────────────────────────────────────────────────────────────────────
  update-changelog:
    name: Update Changelog
    needs: deploy                          # FIX #9: isolated job — won't run if deploy fails
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Prepend changelog entry
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')

          # Re-derive from git — outputs from needs.deploy also work,
          # but re-querying git is idempotent and avoids shell escaping issues
          MSG=$(git log -1 --pretty=format:'%s' "$GITHUB_SHA")
          AUTHOR=$(git log -1 --pretty=format:'%an' "$GITHUB_SHA")

          # ── FIX #5: Bootstrap file if it doesn't exist ──────────────────
          if [ ! -f CHANGELOG.md ]; then
            printf '# Changelog\n\n> Auto-generated by Sapphire CI/CD\n\n---\n\n' \
              > CHANGELOG.md
          fi

          # ── Build entry with printf — safe against special characters ────
          ENTRY=$(printf \
            '## [%s] `%s` — %s\n> **Msg:** %s\n> **Author:** %s\n> **Env:** %s\n\n---\n\n' \
            "$TIMESTAMP" \
            "$SHORT_SHA" \
            "${{ inputs.environment }}" \
            "$MSG" \
            "$AUTHOR" \
            "${{ inputs.environment }}")

          # Prepend to existing file
          printf '%s' "$ENTRY" | cat - CHANGELOG.md > changelog.tmp \
            && mv changelog.tmp CHANGELOG.md

          git config user.name  "sapphire-automation[bot]"
          git config user.email "sapphire-automation@noreply.github.com"   # FIX #2
          git add CHANGELOG.md

          # ── FIX #7: Only commit when content actually changed ────────────
          if git diff --staged --quiet; then
            echo "ℹ️  No changelog delta — skipping commit."
            exit 0
          fi

          # ── FIX #8: Rebase before push to handle concurrent runs ─────────
          git pull --rebase origin "${{ github.ref_name }}"
          git commit -m "docs: update changelog for ${SHORT_SHA} [skip ci]"
          git push origin "${{ github.ref_name }}"
          echo "✅ Changelog updated and pushed."


  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — DISCORD NOTIFICATION
  # FIX #6: `if: always()` guarantees this runs on both success AND failure.
  # Dynamically resolves embed color/icon based on upstream job outcomes.
  # ──────────────────────────────────────────────────────────────────────────
  notify-discord:
    name: Notify Discord
    needs: [deploy, update-changelog]
    runs-on: ubuntu-latest
    if: always()                           # FIX #6: fires on failure too

    steps:
      - name: 🎨 Resolve notification status
        id: resolve
        run: |
          DEPLOY="${{ needs.deploy.result }}"
          CHANGELOG="${{ needs.update-changelog.result }}"

          # changelog can be "skipped" if deploy failed — that's still expected
          if [[ "$DEPLOY" == "success" && \
              ( "$CHANGELOG" == "success" || "$CHANGELOG" == "skipped" ) ]]; then
            echo "label=Deployment Successful"    >> "$GITHUB_OUTPUT"
            echo "color=3066993"                  >> "$GITHUB_OUTPUT"  # green
            echo "icon=🚀"                        >> "$GITHUB_OUTPUT"

          elif [[ "$DEPLOY" == "failure" ]]; then
            echo "label=Deployment Failed"        >> "$GITHUB_OUTPUT"
            echo "color=15158332"                 >> "$GITHUB_OUTPUT"  # red
            echo "icon=❌"                        >> "$GITHUB_OUTPUT"

          elif [[ "$DEPLOY" == "success" && "$CHANGELOG" == "failure" ]]; then
            echo "label=Partial Failure (Changelog)" >> "$GITHUB_OUTPUT"
            echo "color=16776960"                    >> "$GITHUB_OUTPUT"  # yellow
            echo "icon=⚠️"                          >> "$GITHUB_OUTPUT"

          else
            echo "label=Unknown State"           >> "$GITHUB_OUTPUT"
            echo "color=8421504"                 >> "$GITHUB_OUTPUT"  # grey
            echo "icon=❓"                       >> "$GITHUB_OUTPUT"
          fi

      # ── FIX #1: ALL dynamic values go through env vars → jq --arg.
      # jq handles JSON escaping. Commit messages with quotes, newlines,
      # backslashes, etc. are fully neutralized. Zero injection surface. ──
      - name: 💬 Send Discord embed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS_LABEL:        ${{ steps.resolve.outputs.label }}
          STATUS_COLOR:        ${{ steps.resolve.outputs.color }}
          STATUS_ICON:         ${{ steps.resolve.outputs.icon }}
          REPO:                ${{ github.repository }}
          BRANCH:              ${{ github.ref_name }}
          ACTOR:               ${{ github.actor }}
          ENV_NAME:            ${{ inputs.environment }}
          COMMIT_SHA:          ${{ needs.deploy.outputs.short_sha }}
          COMMIT_MSG:          ${{ needs.deploy.outputs.commit_message }}
          COMMIT_AUTHOR:       ${{ needs.deploy.outputs.commit_author }}
          DEPLOY_RESULT:       ${{ needs.deploy.result }}
          CHANGELOG_RESULT:    ${{ needs.update-changelog.result }}
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          TITLE="${STATUS_ICON} ${STATUS_LABEL}: ${REPO}"

          # Build description as a shell variable — safe, readable, maintainable
          DESC="**Repository:** \`${REPO}\`
**Environment:** \`${ENV_NAME}\`
**Branch:** \`${BRANCH}\`
**Commit:** \`${COMMIT_SHA}\`
**Message:** ${COMMIT_MSG}
**Author:** ${COMMIT_AUTHOR}
**Actor:** ${ACTOR}
**Deploy:** ${DEPLOY_RESULT} | **Changelog:** ${CHANGELOG_RESULT}"

          # jq builds the JSON payload — all escaping is handled internally
          PAYLOAD=$(jq -n \
            --arg  title  "$TITLE"  \
            --arg  desc   "$DESC"   \
            --argjson color "$STATUS_COLOR" \
            --arg  ts     "$TIMESTAMP" \
            '{
              "embeds": [{
                "title":       $title,
                "description": $desc,
                "color":       $color,
                "footer": {
                  "text": "Sapphire CI/CD \u2022 GitHub Actions"
                },
                "timestamp": $ts
              }]
            }')

          # Capture HTTP response code for explicit error detection
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [[ "$HTTP_CODE" -ne 204 ]]; then
            echo "❌ Discord webhook returned unexpected HTTP ${HTTP_CODE}"
            exit 1
          fi

          echo "✅ Discord notified — HTTP ${HTTP_CODE}"
